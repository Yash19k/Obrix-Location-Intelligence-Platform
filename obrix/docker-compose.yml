version: "3.9"

# ── Obrix — Development Stack ──────────────────────────────────────────────
# Services: PostgreSQL + PostGIS, Redis, Django backend, React frontend

services:

  # ── Database ───────────────────────────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4
    container_name: obrix_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-obrix_db}
      POSTGRES_USER: ${DB_USER:-obrix_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-obrix_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-obrix_user} -d ${DB_NAME:-obrix_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery broker) ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: obrix_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Django) ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: obrix_backend
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-prod}
      DEBUG: "True"
      DB_NAME: ${DB_NAME:-obrix_db}
      DB_USER: ${DB_USER:-obrix_user}
      DB_PASSWORD: ${DB_PASSWORD:-obrix_pass}
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://frontend:80"
    volumes:
      - ./backend:/app # Live-reload in development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  # ── Frontend (React/Vite) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000/api/v1
    container_name: obrix_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
